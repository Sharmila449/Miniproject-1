<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Tic Tac Toe</h1>

    <div class="buttons">
        <button>Start Game</button>
        <button>Restart Game</button>
    </div>

    <div class="board">
        <div class="cell">X</div>
        <div class="cell">O</div>
        <div class="cell">X</div>

        <div class="cell"></div>
        <div class="cell">O</div>
        <div class="cell"></div>

        <div class="cell">X</div>
        <div class="cell"></div>
        <div class="cell">O</div>
    </div>

</div>

</body>
</html>
